<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none">
  <!-- App icon / favicon version of the VDOC mark.
       A single continuous ribbon folding into a V —
       play button + document corner in one gesture. -->

  <!-- Background plate -->
  <rect x="8" y="8" width="144" height="144" rx="24" fill="#121318" stroke="#1e1f27" stroke-width="2"/>

  <!-- Fold mark -->
  <path d="M48 44 L80 116 L112 44" stroke="#22d3ee" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M112 44 L112 60" stroke="#22d3ee" stroke-width="8" stroke-linecap="round" fill="none"/>
</svg>
