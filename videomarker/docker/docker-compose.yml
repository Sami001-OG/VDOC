version: "3.9"

services:
  vdoc:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      - ./videos:/videos:ro
    env_file:
      - ../.env
    command: ["vdoc", "serve", "--host", "0.0.0.0", "--port", "8080"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  vdoc-cli:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ./data:/data
      - ./videos:/videos:ro
    env_file:
      - ../.env
    entrypoint: ["vdoc"]
    profiles:
      - cli
