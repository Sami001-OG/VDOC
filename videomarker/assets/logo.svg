<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="vPrimary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="vFold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>

  <!--
    VDOC Brand Mark — "The Folded V"
    A geometric V constructed from two parallel bars.
    Left leg: solid, stable — represents the video foundation.
    Right leg: features a document-fold corner at top-right — represents the document intelligence.
    The fold creates a subtle, ownable detail that communicates "document" without text.
    Clean 45° geometry. Symmetrical stance. Premium monochrome-adjacent palette.
  -->

  <!-- Left leg — video (solid, stable) -->
  <path d="M 108,80 L 168,80 L 256,440 L 196,440 Z" fill="url(#vPrimary)"/>

  <!-- Right leg — document (with fold detail) -->
  <path d="M 344,80 L 380,80 L 404,104 L 316,440 L 256,440 Z" fill="url(#vPrimary)"/>

  <!-- Fold flap — folded corner revealing the underside -->
  <path d="M 380,80 L 404,80 L 404,104 Z" fill="url(#vFold)"/>
</svg>
